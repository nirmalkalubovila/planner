name: CI Checks # The name that appears in the Actions tab

# 1. When should this run?
on:
  push:
    branches: [ "main" ] # Runs when you merge to main
  pull_request:
    branches: [ "main" ] # Runs on every PR targeting main

# 2. What jobs should run?
jobs:
  # JOB 1: The Build Check (Did I break the compile?)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # 'ci' is faster and safer than 'install' for servers

      - name: Run Build
        run: npm run build # Fails if the app crashes during build

  # JOB 2: The Lint Check (Did I write messy code?)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint # Fails if ESLint finds errors